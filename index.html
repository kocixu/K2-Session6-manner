<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>超級說話小隊 - Super Speaker Squad</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #f0f8ff;
            font-family: 'Helvetica Neue', 'PingFang HK', 'Microsoft JhengHei', Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }
        #gameContainer {
            box-shadow: 0 10px 30px rgba(0,0,0,0.15);
            border-radius: 16px;
            overflow: hidden;
            background: #fff;
        }
        canvas {
            display: block;
            cursor: pointer;
        }
    </style>
</head>
<body>

<div id="gameContainer">
    <canvas id="gameCanvas" width="1024" height="576"></canvas>
</div>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

// --- GAME DATA & CONFIGURATION ---
const phrases = [
    { id: 'm4goi1', text: '唔該', scenario: '同學遞支鉛筆比你，要講...', color: '#FF6B6B', tone: 'm4goi1' },
    { id: 'do1ze6', text: '多謝', scenario: '朋友送份貼紙禮物比你，要講...', color: '#4DABF7', tone: 'do1ze6' },
    { id: 'ngo5jiu3', text: '我要', scenario: '食茶點想要蘋果，同老師講...', color: '#51CF66', tone: 'ngo5jiu3' },
    { id: 'bong1ngo5', text: '幫我', scenario: '拉唔到外套拉鏈，同老師講...', color: '#FCC419', tone: 'bong1ngo5' },
    { id: 'bei2nei5', text: '比你', scenario: '將架玩具車分享比朋友，要講...', color: '#B197FC', tone: 'bei2nei5' }
];

let gameState = 'START'; 
let currentTarget = null;
let options = [];
let feedbackMessage = '';
let feedbackColor = '#000';
let score = 0;
const targetScore = 5;

let audioCtx = null;

function drawRoundedRect(x, y, width, height, radius, fill, stroke, strokeColor) {
    ctx.beginPath();
    ctx.moveTo(x + radius, y);
    ctx.lineTo(x + width - radius, y);
    ctx.arcTo(x + width, y, x + width, y + height, radius);
    ctx.lineTo(x + width, y + height - radius);
    ctx.arcTo(x + width, y + height, x + width - radius, y + height, radius);
    ctx.lineTo(x + radius, y + height);
    ctx.arcTo(x, y + height, x, y + height - radius, radius);
    ctx.lineTo(x, y + radius);
    ctx.arcTo(x, y, x + radius, y, radius);
    ctx.closePath();
    if (fill) ctx.fill();
    if (stroke) {
        ctx.strokeStyle = strokeColor || '#000';
        ctx.stroke();
    }
}

function initAudio() {
    if (!audioCtx) {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    }
    if (audioCtx.state === 'suspended') {
        audioCtx.resume();
    }
}

// Synthesizer with strict acoustic mapping for Cantonese tones
function playToneSequence(type) {
    if (!audioCtx) return;
    const now = audioCtx.currentTime;
    
    const osc1 = audioCtx.createOscillator();
    const gain1 = audioCtx.createGain();
    osc1.connect(gain1);
    gain1.connect(audioCtx.destination);
    
    const osc2 = audioCtx.createOscillator();
    const gain2 = audioCtx.createGain();
    osc2.connect(gain2);
    gain2.connect(audioCtx.destination);

    osc1.type = 'triangle';
    osc2.type = 'sine';

    if (type === 'm4goi1') { 
        // 唔該: low falling (220 -> 200) then clear high flat (392)
        osc1.frequency.setValueAtTime(220, now);
        osc1.frequency.linearRampToValueAtTime(200, now + 0.2);
        osc1.frequency.setValueAtTime(392, now + 0.25);
        osc1.frequency.setValueAtTime(392, now + 0.5);

        osc2.frequency.setValueAtTime(440, now);
        osc2.frequency.linearRampToValueAtTime(400, now + 0.2);
        osc2.frequency.setValueAtTime(784, now + 0.25);
        osc2.frequency.setValueAtTime(784, now + 0.5);
    } 
    else if (type === 'do1ze6') { 
        // 多謝: high flat (392) then low flat (220)
        osc1.frequency.setValueAtTime(392, now);
        osc1.frequency.setValueAtTime(392, now + 0.2);
        osc1.frequency.setValueAtTime(220, now + 0.25);
        osc1.frequency.setValueAtTime(220, now + 0.5);

        osc2.frequency.setValueAtTime(784, now);
        osc2.frequency.setValueAtTime(784, now + 0.2);
        osc2.frequency.setValueAtTime(440, now + 0.25);
        osc2.frequency.setValueAtTime(440, now + 0.5);
    } 
    else if (type === 'ngo5jiu3') { 
        // 我要: low rising (220 -> 293) then mid flat (330)
        osc1.frequency.setValueAtTime(220, now);
        osc1.frequency.exponentialRampToValueAtTime(293, now + 0.2);
        osc1.frequency.setValueAtTime(330, now + 0.25);
        osc1.frequency.setValueAtTime(330, now + 0.5);

        osc2.frequency.setValueAtTime(440, now);
        osc2.frequency.exponentialRampToValueAtTime(586, now + 0.2);
        osc2.frequency.setValueAtTime(660, now + 0.25);
        osc2.frequency.setValueAtTime(660, now + 0.5);
    } 
    else if (type === 'bong1ngo5') { 
        // 幫我: high flat (392) then low rising (220 -> 293)
        osc1.frequency.setValueAtTime(392, now);
        osc1.frequency.setValueAtTime(392, now + 0.2);
        osc1.frequency.setValueAtTime(220, now + 0.25);
        osc1.frequency.exponentialRampToValueAtTime(293, now + 0.5);

        osc2.frequency.setValueAtTime(784, now);
        osc2.frequency.setValueAtTime(784, now + 0.2);
        osc2.frequency.setValueAtTime(440, now + 0.25);
        osc2.frequency.exponentialRampToValueAtTime(586, now + 0.5);
    } 
    else if (type === 'bei2nei5') { 
        // 比你: low rising (220 -> 293) then low rising (220 -> 293)
        osc1.frequency.setValueAtTime(220, now);
        osc1.frequency.exponentialRampToValueAtTime(293, now + 0.2);
        osc1.frequency.setValueAtTime(220, now + 0.25);
        osc1.frequency.exponentialRampToValueAtTime(293, now + 0.5);

        osc2.frequency.setValueAtTime(440, now);
        osc2.frequency.exponentialRampToValueAtTime(586, now + 0.2);
        osc2.frequency.setValueAtTime(440, now + 0.25);
        osc2.frequency.exponentialRampToValueAtTime(586, now + 0.5);
    } 
    else if (type === 'success') { 
        osc1.type = 'sine';
        osc1.frequency.setValueAtTime(523.25, now); // C5
        osc1.frequency.setValueAtTime(659.25, now + 0.1); // E5
        osc1.frequency.setValueAtTime(783.99, now + 0.2); // G5
    } 
    else if (type === 'fail') { 
        osc1.type = 'sawtooth';
        osc1.frequency.setValueAtTime(150, now);
        osc1.frequency.linearRampToValueAtTime(100, now + 0.3);
    }

    // Envelope configs
    const duration = (type === 'success' || type === 'fail') ? 0.3 : 0.6;
    gain1.gain.setValueAtTime(0.2, now);
    gain1.gain.exponentialRampToValueAtTime(0.01, now + duration);
    gain2.gain.setValueAtTime(0.1, now);
    gain2.gain.exponentialRampToValueAtTime(0.01, now + duration);

    osc1.start(now);
    osc1.stop(now + duration + 0.05);
    osc2.start(now);
    osc2.stop(now + duration + 0.05);
}

function initRound() {
    if (score >= targetScore) {
        gameState = 'WIN';
        return;
    }
    
    currentTarget = phrases[Math.floor(Math.random() * phrases.length)];
    let pool = [...phrases].filter(p => p.id !== currentTarget.id);
    options = [currentTarget];
    
    while(options.length < 3) {
        let index = Math.floor(Math.random() * pool.length);
        options.push(pool[index]);
        pool.splice(index, 1);
    }
    
    options.sort(() => Math.random() - 0.5);
    gameState = 'PLAYING';
    
    setTimeout(() => { playToneSequence(currentTarget.tone); }, 400);
}

const audioButton = { x: 452, y: 120, w: 120, h: 120 };
const cards = [
    { x: 80, y: 320, w: 260, h: 200 },
    { x: 382, y: 320, w: 260, h: 200 },
    { x: 684, y: 320, w: 260, h: 200 }
];

function drawStartScreen() {
    ctx.fillStyle = '#f0f8ff';
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    
    ctx.fillStyle = '#2B8A3E';
    ctx.font = 'bold 50px "PingFang HK", Arial';
    ctx.textAlign = 'center';
    ctx.fillText('超級說話小隊 🚀', 512, 190);
    
    ctx.fillStyle = '#495057';
    ctx.font = '24px "PingFang HK", Arial';
    ctx.fillText('聽廣東話語音，搵出岩對應嘅生活場景！', 512, 260);
    
    ctx.fillStyle = '#10B981';
    drawRoundedRect(412, 360, 200, 70, 20, true, false);
    
    ctx.fillStyle = '#FFF';
    ctx.font = 'bold 28px "PingFang HK", Arial';
    ctx.fillText('開始遊戲', 512, 405);
}

function drawPlayingScreen() {
    ctx.fillStyle = '#FFF';
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    
    ctx.fillStyle = '#495057';
    ctx.font = 'bold 24px "PingFang HK", Arial';
    ctx.textAlign = 'left';
    ctx.fillText(`🌟 得分: ${score} / ${targetScore}`, 40, 50);
    
    ctx.fillStyle = '#E3FAFC';
    ctx.lineWidth = 4;
    drawRoundedRect(audioButton.x, audioButton.y, audioButton.w, audioButton.h, 25, true, true, '#15AABF');
    
    ctx.fillStyle = '#15AABF';
    ctx.font = 'bold 55px Arial';
    ctx.textAlign = 'center';
    ctx.fillText('👂', 512, 195);
    ctx.font = 'bold 16px "PingFang HK", Arial';
    ctx.fillText('點擊聽廣東話', 512, 225);

    for (let i = 0; i < options.length; i++) {
        let card = cards[i];
        let opt = options[i];
        
        ctx.fillStyle = '#FFF';
        ctx.shadowColor = 'rgba(0,0,0,0.08)';
        ctx.shadowBlur = 15;
        ctx.shadowOffsetY = 6;
        
        drawRoundedRect(card.x, card.y, card.w, card.h, 16, true, false);
        ctx.shadowColor = 'transparent';
        
        ctx.lineWidth = 3;
        ctx.strokeStyle = opt.color;
        drawRoundedRect(card.x, card.y, card.w, card.h, 16, false, true, opt.color);
        
        ctx.fillStyle = opt.color;
        ctx.font = '60px Arial';
        ctx.fillText('🏫', card.x + card.w/2, card.y + 80);
        
        ctx.fillStyle = '#212529';
        ctx.font = 'bold 20px "PingFang HK", Arial';
        wrapText(ctx, opt.scenario, card.x + 20, card.y + 130, card.w - 40, 28);
    }
}

function drawFeedbackScreen() {
    drawPlayingScreen();
    ctx.fillStyle = 'rgba(255,255,255,0.9)';
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    
    ctx.fillStyle = feedbackColor;
    ctx.font = 'bold 48px "PingFang HK", Arial';
    ctx.textAlign = 'center';
    ctx.fillText(feedbackMessage, 512, 280);
}

function drawWinScreen() {
    ctx.fillStyle = '#E6FCF5';
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    
    ctx.fillStyle = '#0CA678';
    ctx.font = 'bold 55px "PingFang HK", Arial';
    ctx.textAlign = 'center';
    ctx.fillText('好棒！你完成挑戰喇！ 🎉', 512, 230);
    
    ctx.fillStyle = '#63E6BE';
    ctx.font = '100px Arial';
    ctx.fillText('⭐⭐⭐⭐延', 512, 350);
    
    ctx.fillStyle = '#212529';
    ctx.font = '22px "PingFang HK", Arial';
    ctx.fillText('點擊任何地方重新玩過！', 512, 450);
}

function wrapText(context, text, x, y, maxWidth, lineHeight) {
    // Character-by-character split for clean traditional Chinese wrapping rules
    let chars = text.split('');
    let line = '';
    for(let n = 0; n < chars.length; n++) {
        let testLine = line + chars[n];
        let testWidth = context.measureText(testLine).width;
        if (testWidth > maxWidth && n > 0) {
            context.fillText(line, x + maxWidth/2 - context.measureText(line).width/2, y);
            line = chars[n];
            y += lineHeight;
        } else {
            line = testLine;
        }
    }
    context.fillText(line, x + maxWidth/2 - context.measureText(line).width/2, y);
}

canvas.addEventListener('click', function(e) {
    const rect = canvas.getBoundingClientRect();
    const mx = e.clientX - rect.left;
    const my = e.clientY - rect.top;
    
    initAudio();

    if (gameState === 'START') {
        if (mx >= 412 && mx <= 612 && my >= 360 && my <= 430) {
            score = 0;
            initRound();
        }
    } 
    else if (gameState === 'PLAYING') {
        if (mx >= audioButton.x && mx <= audioButton.x + audioButton.w &&
            my >= audioButton.y && my <= audioButton.y + audioButton.h) {
            playToneSequence(currentTarget.tone);
            return;
        }
        
        for (let i = 0; i < cards.length; i++) {
            let card = cards[i];
            if (mx >= card.x && mx <= card.x + card.w && my >= card.y && my <= card.y + card.h) {
                if (options[i].id === currentTarget.id) {
                    score++;
                    feedbackMessage = "答對了！👍 啱晒喇！";
                    feedbackColor = "#2B8A3E";
                    playToneSequence('success');
                } else {
                    feedbackMessage = "試多一次，再聽下？";
                    feedbackColor = "#C92A2A";
                    playToneSequence('fail');
                }
                gameState = 'FEEDBACK';
                setTimeout(() => { initRound(); }, 1800);
            }
        }
    } 
    else if (gameState === 'WIN') {
        gameState = 'START';
    }
});

function gameLoop() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    if (gameState === 'START') drawStartScreen();
    else if (gameState === 'PLAYING') drawPlayingScreen();
    else if (gameState === 'FEEDBACK') drawFeedbackScreen();
    else if (gameState === 'WIN') drawWinScreen();
    requestAnimationFrame(gameLoop);
}

gameLoop();
</script>

</body>
</html>
