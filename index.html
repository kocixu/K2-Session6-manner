
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Super Speaker Squad - 超級說話小隊</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #f0f8ff;
            font-family: 'Helvetica Neue', Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }
        #gameContainer {
            box-shadow: 0 10px 30px rgba(0,0,0,0.15);
            border-radius: 16px;
            overflow: hidden;
            background: #fff;
        }
        canvas {
            display: block;
            cursor: pointer;
        }
    </style>
</head>
<body>

<div id="gameContainer">
    <canvas id="gameCanvas" width="1024" height="576"></canvas>
</div>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

// --- GAME DATA & CONFIGURATION ---
const phrases = [
    { id: 'm4goi1', text: '唔該 (m4 goi1)', scenario: 'Classmate hands you a pencil', color: '#FF6B6B', tone: 'low' },
    { id: 'do1ze6', text: '多謝 (do1 ze6)', scenario: 'Friend gives you a sticker gift', color: '#4DABF7', tone: 'high' },
    { id: 'ngo5jiu3', text: '我要 (ngo5 jiu3)', scenario: 'Pointing to apples at snack time', color: '#51CF66', tone: 'rising' },
    { id: 'bong1ngo5', text: '幫我 (bong1 ngo5)', scenario: 'Struggling to zip up a jacket', color: '#FCC419', tone: 'falling' },
    { id: 'bei2nei5', text: '比你 (bei2 nei5)', scenario: 'Handing a toy car to a friend', color: '#B197FC', tone: 'flat-high' }
];

let gameState = 'START'; // START, PLAYING, FEEDBACK, WIN
let currentTarget = null;
let options = [];
let feedbackMessage = '';
let feedbackColor = '#000';
let score = 0;
const targetScore = 5;

// Sound synthesizer using Web Audio API to simulate language tones/cues
const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

function playToneSequence(type) {
    const now = audioCtx.currentTime;
    
    // Primary syllable oscillator
    const osc1 = audioCtx.createOscillator();
    const gain1 = audioCtx.createGain();
    osc1.connect(gain1);
    gain1.connect(audioCtx.destination);
    
    // Secondary harmonizing oscillator for child-directed speech thickness
    const osc2 = audioCtx.createOscillator();
    const gain2 = audioCtx.createGain();
    osc2.connect(gain2);
    gain2.connect(audioCtx.destination);

    osc1.type = 'triangle';
    osc2.type = 'sine';

    // Simulate basic Cantonese tonal contours via pitch glide arrays
    if (type === 'low') { // 唔該
        osc1.frequency.setValueAtTime(220, now);
        osc1.frequency.exponentialRampToValueAtTime(290, now + 0.4);
        osc2.frequency.setValueAtTime(440, now);
        osc2.frequency.exponentialRampToValueAtTime(580, now + 0.4);
    } else if (type === 'high') { // 多謝
        osc1.frequency.setValueAtTime(350, now);
        osc1.frequency.setValueAtTime(330, now + 0.2);
        osc2.frequency.setValueAtTime(700, now);
        osc2.frequency.setValueAtTime(660, now + 0.2);
    } else if (type === 'rising') { // 我要
        osc1.frequency.setValueAtTime(240, now);
        osc1.frequency.exponentialRampToValueAtTime(380, now + 0.3);
        osc2.frequency.setValueAtTime(480, now);
        osc2.frequency.exponentialRampToValueAtTime(760, now + 0.3);
    } else if (type === 'falling') { // 幫我
        osc1.frequency.setValueAtTime(320, now);
        osc1.frequency.linearRampToValueAtTime(220, now + 0.4);
        osc2.frequency.setValueAtTime(640, now);
        osc2.frequency.linearRampToValueAtTime(440, now + 0.4);
    } else if (type === 'flat-high') { // 比你
        osc1.frequency.setValueAtTime(330, now);
        osc1.frequency.setValueAtTime(340, now + 0.3);
        osc2.frequency.setValueAtTime(660, now);
        osc2.frequency.setValueAtTime(680, now + 0.3);
    } else if (type === 'success') { // Correct Match
        osc1.type = 'sine';
        osc1.frequency.setValueAtTime(440, now);
        osc1.frequency.setValueAtTime(554.37, now + 0.1);
        osc1.frequency.setValueAtTime(659.25, now + 0.2);
    } else if (type === 'fail') { // Incorrect Match
        osc1.type = 'sawtooth';
        osc1.frequency.setValueAtTime(180, now);
        osc1.frequency.linearRampToValueAtTime(120, now + 0.3);
    }

    gain1.gain.setValueAtTime(0.2, now);
    gain1.gain.exponentialRampToValueAtTime(0.01, now + 0.4);
    gain2.gain.setValueAtTime(0.1, now);
    gain2.gain.exponentialRampToValueAtTime(0.01, now + 0.4);

    osc1.start(now);
    osc1.stop(now + 0.45);
    osc2.start(now);
    osc2.stop(now + 0.45);
}

// --- GAME LOGIC ---

function initRound() {
    if (score >= targetScore) {
        gameState = 'WIN';
        return;
    }
    
    // Pick a random target phrase
    currentTarget = phrases[Math.floor(Math.random() * phrases.length)];
    
    // Shuffle options array (always include target)
    let pool = [...phrases];
    options = [];
    options.push(currentTarget);
    pool = pool.filter(p => p.id !== currentTarget.id);
    
    // Grab 2 more random items for choices
    while(options.length < 3) {
        let index = Math.floor(Math.random() * pool.length);
        options.push(pool[index]);
        pool.splice(index, 1);
    }
    
    // Randomize positions on screen
    options.sort(() => Math.random() - 0.5);
    gameState = 'PLAYING';
    
    // Auto play target sound at start of turn
    setTimeout(() => { playToneSequence(currentTarget.tone); }, 400);
}

// UI Hitboxes
const audioButton = { x: 512 - 60, y: 120, w: 120, h: 120 };
const cards = [
    { x: 80, y: 320, w: 260, h: 200 },
    { x: 382, y: 320, w: 260, h: 200 },
    { x: 684, y: 320, w: 260, h: 200 }
];

// --- RENDER FUNCTIONS ---

function drawStartScreen() {
    ctx.fillStyle = '#f0f8ff';
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    
    ctx.fillStyle = '#2B8A3E';
    ctx.font = 'bold 44px Arial';
    ctx.textAlign = 'center';
    ctx.fillText('Super Speaker Squad!', 512, 200);
    
    ctx.fillStyle = '#495057';
    ctx.font = '24px Arial';
    ctx.fillText('Listen to the Cantonese phrase and tap the right action context!', 512, 260);
    
    // Play Button Box
    ctx.fillStyle = '#10B981';
    ctx.beginPath();
    ctx.roundRect(412, 360, 200, 70, 20);
    ctx.fill();
    
    ctx.fillStyle = '#FFF';
    ctx.font = 'bold 28px Arial';
    ctx.fillText('START GAME', 512, 405);
}

function drawPlayingScreen() {
    ctx.fillStyle = '#FFF';
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    
    // Top Score Dashboard
    ctx.fillStyle = '#495057';
    ctx.font = 'bold 22px Arial';
    ctx.textAlign = 'left';
    ctx.fillText(`Stars Obtained: ${score} / ${targetScore}`, 40, 50);
    
    // Audio Dynamic Trigger Unit (The Big Ear Button)
    ctx.fillStyle = '#E3FAFC';
    ctx.strokeStyle = '#15AABF';
    ctx.lineWidth = 4;
    ctx.beginPath();
    ctx.roundRect(audioButton.x, audioButton.y, audioButton.w, audioButton.h, 25);
    ctx.fill();
    ctx.stroke();
    
    // Symbolizing Sound Waves
    ctx.fillStyle = '#15AABF';
    ctx.font = 'bold 50px Arial';
    ctx.textAlign = 'center';
    ctx.fillText('👂', 512, 195);
    ctx.font = '16px Arial';
    ctx.fillText('TAP TO LISTEN', 512, 225);

    // Option Cards Layout
    for (let i = 0; i < options.length; i++) {
        let card = cards[i];
        let opt = options[i];
        
        ctx.fillStyle = '#FFF';
        ctx.shadowColor = 'rgba(0,0,0,0.08)';
        ctx.shadowBlur = 15;
        ctx.shadowOffsetY = 6;
        
        ctx.beginPath();
        ctx.roundRect(card.x, card.y, card.w, card.h, 16);
        ctx.fill();
        
        // Reset shadow for next items
        ctx.shadowColor = 'transparent';
        
        ctx.lineWidth = 3;
        ctx.strokeStyle = opt.color;
        ctx.stroke();
        
        // Dynamic Character Icons / Contextual Descriptions (Replacing complex character text mapping)
        ctx.fillStyle = opt.color;
        ctx.font = '50px Arial';
        ctx.fillText('🏫', card.x + card.w/2, card.y + 70);
        
        ctx.fillStyle = '#212529';
        ctx.font = 'bold 18px Arial';
        wrapText(ctx, opt.scenario, card.x + 20, card.y + 120, card.w - 40, 24);
    }
}

function drawFeedbackScreen() {
    drawPlayingScreen();
    
    // Modal Overlay Mask
    ctx.fillStyle = 'rgba(255,255,255,0.85)';
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    
    ctx.fillStyle = feedbackColor;
    ctx.font = 'bold 50px Arial';
    ctx.textAlign = 'center';
    ctx.fillText(feedbackMessage, 512, 280);
}

function drawWinScreen() {
    ctx.fillStyle = '#E6FCF5';
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    
    ctx.fillStyle = '#0CA678';
    ctx.font = 'bold 55px Arial';
    ctx.textAlign = 'center';
    ctx.fillText('Hooray! You are a Super Speaker! 🎉', 512, 240);
    
    ctx.fillStyle = '#63E6BE';
    ctx.font = '100px Arial';
    ctx.fillText('⭐⭐⭐⭐⭐', 512, 360);
    
    ctx.fillStyle = '#212529';
    ctx.font = '20px Arial';
    ctx.fillText('Tap anywhere to play again!', 512, 450);
}

// Utility text wrapper for multi-line scenario text boxes
function wrapText(context, text, x, y, maxWidth, lineHeight) {
    let words = text.split(' ');
    let line = '';
    for(let n = 0; n < words.length; n++) {
        let testLine = line + words[n] + ' ';
        let metrics = context.measureText(testLine);
        let testWidth = metrics.width;
        if (testWidth > maxWidth && n > 0) {
            context.fillText(line, x + maxWidth/2 - context.measureText(line).width/2, y);
            line = words[n] + ' ';
            y += lineHeight;
        } else {
            line = testLine;
        }
    }
    context.fillText(line, x + maxWidth/2 - context.measureText(line).width/2, y);
}

// --- INPUT EVENTS PROCESSING ---

canvas.addEventListener('click', function(e) {
    const rect = canvas.getBoundingClientRect();
    const mx = e.clientX - rect.left;
    const my = e.clientY - rect.top;
    
    // Initialize standard AudioContext state on first touch for modern browser permission rules
    if (audioCtx.state === 'suspended') {
        audioCtx.resume();
    }

    if (gameState === 'START') {
        if (mx >= 412 && mx <= 612 && my >= 360 && my <= 430) {
            score = 0;
            initRound();
        }
    } 
    else if (gameState === 'PLAYING') {
        // Trigger Repeat Audio Audio Loop
        if (mx >= audioButton.x && mx <= audioButton.x + audioButton.w &&
            my >= audioButton.y && my <= audioButton.y + audioButton.h) {
            playToneSequence(currentTarget.tone);
            return;
        }
        
        // Loop over the layout choice card configurations
        for (let i = 0; i < cards.length; i++) {
            let card = cards[i];
            if (mx >= card.x && mx <= card.x + card.w && my >= card.y && my <= card.y + card.h) {
                if (options[i].id === currentTarget.id) {
                    score++;
                    feedbackMessage = "Excellent! ✨ Correct Meaning Match!";
                    feedbackColor = "#2B8A3E";
                    playToneSequence('success');
                } else {
                    feedbackMessage = "Let's try that one again!";
                    feedbackColor = "#C92A2A";
                    playToneSequence('fail');
                }
                gameState = 'FEEDBACK';
                setTimeout(() => { initRound(); }, 1800);
            }
        }
    } 
    else if (gameState === 'WIN') {
        gameState = 'START';
    }
});

// --- CORE GAME LOOP ---
function gameLoop() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    
    if (gameState === 'START') drawStartScreen();
    else if (gameState === 'PLAYING') drawPlayingScreen();
    else if (gameState === 'FEEDBACK') drawFeedbackScreen();
    else if (gameState === 'WIN') drawWinScreen();
    
    requestAnimationFrame(gameLoop);
}

// Fire execution pipeline
gameLoop();
</script>

</body>
</html>
