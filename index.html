<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>超級說話小隊 - Super Speaker Squad</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #f0f8ff;
            font-family: 'Helvetica Neue', 'PingFang HK', 'Microsoft JhengHei', Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
            touch-action: manipulation;
        }
        
        #gameApp {
            width: 100%;
            max-width: 960px;
            aspect-ratio: 16 / 9;
            background: #ffffff;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            box-sizing: border-box;
            padding: 3vh 4vw;
        }

        @media (max-aspect-ratio: 16/9) {
            #gameApp {
                width: 95vw;
                height: calc(95vw * 9 / 16);
            }
        }

        .screen {
            display: none;
            width: 100%;
            height: 100%;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        .screen.active { display: flex; }

        h1 { color: #2B8A3E; font-size: 4.5vh; margin: 0 0 1vh 0; }
        p { color: #495057; font-size: 2.5vh; margin: 0 0 3vh 0; text-align: center; }
        
        .score-bar {
            align-self: flex-start;
            font-size: 2.6vh;
            font-weight: bold;
            color: #495057;
            margin-bottom: 0.5vh;
        }

        /* Top Scenario Box */
        .scenario-container {
            background: #f8f9fa;
            border: 3px solid #dee2e6;
            border-radius: 16px;
            width: 90%;
            padding: 2vh 2vw;
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .scenario-emoji { font-size: 6vh; margin-bottom: 0.5vh; line-height: 1; }
        .scenario-text { font-size: 2.8vh; font-weight: bold; color: #212529; line-height: 1.3; }
        
        /* Single Replay Button Layout */
        .audio-control-deck {
            margin-top: 1.5vh;
        }
        .audio-btn-whole {
            background: #E6FFFA;
            border: 2px solid #0EA5E9;
            border-radius: 12px;
            padding: 1vh 2.5vw;
            color: #0EA5E9;
            font-weight: bold;
            font-size: 2vh;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 0.5vw;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }
        .audio-btn-whole:active { background: #CCFBF1; }

        /* Bottom Choices Grid */
        .choices-grid {
            display: flex;
            justify-content: center;
            gap: 3vw;
            width: 100%;
            margin-top: 2vh;
        }
        .choice-card {
            background: #ffffff;
            border-radius: 16px;
            flex: 1;
            max-width: 240px;
            height: 20vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            padding: 1.5vh 0;
            cursor: pointer;
            box-shadow: 0 6px 15px rgba(0,0,0,0.06);
            box-sizing: border-box;
            position: relative;
        }
        .choice-main-content {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            flex-grow: 1;
        }
        .choice-icon { font-size: 4vh; margin-bottom: 0.2vh; }
        .choice-text { font-size: 3.5vh; font-weight: bold; color: #ffffff; text-shadow: 0 2px 4px rgba(0,0,0,0.15); }
        
        /* Speaker Button Inside Choice Card */
        .speaker-bubble {
            background: rgba(255, 255, 255, 0.25);
            border: 2px solid #ffffff;
            border-radius: 50%;
            width: 4.5vh;
            height: 4.5vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.2vh;
            color: #ffffff;
            margin-top: 0.5vh;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            transition: background 0.1s;
        }
        .speaker-bubble:active {
            background: rgba(255, 255, 255, 0.5);
        }

        .btn-prime {
            background: #10B981;
            color: white;
            border: none;
            padding: 2vh 5vw;
            font-size: 3vh;
            font-weight: bold;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 6px 15px rgba(16, 185, 129, 0.3);
        }

        .feedback-overlay {
            display: none;
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255,255,255,0.94);
            border-radius: 20px;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 10;
        }
        .feedback-text { font-size: 4.5vh; font-weight: bold; margin-top: 2vh; }
    </style>
</head>
<body>

<div id="gameApp">
    
    <!-- START SCREEN -->
    <div id="startScreen" class="screen active">
        <h1>超級說話小隊! 🚀</h1>
        <p>睇下發生咩事，幫小朋友揀個啱嘅禮貌回應啦！</p>
        <button class="btn-prime" onclick="startGame()">開始遊戲</button>
    </div>

    <!-- MAIN PLAYING SCREEN -->
    <div id="playScreen" class="screen">
        <div class="score-bar" id="scoreDisplay">🌟 得分: 0 / 5</div>
        
        <!-- Scenario Box -->
        <div class="scenario-container">
            <div class="scenario-emoji" id="scenEmoji">🏫</div>
            <div class="scenario-text" id="scenText">載入中...</div>
            
            <div class="audio-control-deck">
                <button class="audio-btn-whole" onclick="playTone(currentItem.toneCode)">
                    📢 聽完整句子
                </button>
            </div>
        </div>

        <!-- Choice Cards Display Frame -->
        <div class="choices-grid" id="choicesGrid"></div>
    </div>

    <!-- WIN SCREEN -->
    <div id="winScreen" class="screen">
        <h1 style="color: #0CA678;">你真用心！你完成挑戰喇！ 🎉</h1>
        <div style="font-size: 10vh; margin: 1vh 0;">⭐⭐⭐⭐⭐</div>
        <button class="btn-prime" onclick="resetToMenu()">再玩一次</button>
    </div>

    <!-- FEEDBACK OVERLAY -->
    <div id="feedbackOverlay" class="feedback-overlay">
        <div id="feedbackEmoji" style="font-size: 12vh;">👍</div>
        <div id="feedbackMsg" class="feedback-text">啱喇！</div>
    </div>

</div>

<script>
const poolScenarios = [
    { phrase: '唔該', emoji: '✏️', text: '同學遞支鉛筆比你，你要同佢講...', tone: 'm4goi1' },
    { phrase: '唔該', emoji: '🧃', text: '老師幫你遞個包裝紙包飲品，你要講...', tone: 'm4goi1' },
    { phrase: '多謝', emoji: '🎁', text: '朋友送咗一份好靚嘅貼紙禮物比你，你要講...', tone: 'do1ze6' },
    { phrase: '多謝', emoji: '🍬', text: '校長送一粒糖果獎勵你，你要同校長講...', tone: 'do1ze6' },
    { phrase: '我要', emoji: '🍎', text: '食茶點嘅時候你想要大蘋果，你要同老師講...', tone: 'ngo5jiu3' },
    { phrase: '我要', emoji: '🎨', text: '美勞堂你想拿藍色嘅畫筆，你要指住講...', tone: 'ngo5jiu3' },
    { phrase: '幫我', emoji: '🧥', text: '你拉唔到外套嘅拉鏈，你要向老師講...', tone: 'bong1ngo5' },
    { phrase: '幫我', emoji: '🍼', text: '水樽蓋扭得太緊打開唔到，你要搵大人講...', tone: 'bong1ngo5' },
    { phrase: '比你', emoji: '🚗', text: '你想將自己架玩具車分享比小隊友玩，你要講...', tone: 'bei2nei5' },
    { phrase: '比你', emoji: '📄', text: '你畫好功課畫冊，雙手交比老師嘅時候要講...', tone: 'bei2nei5' }
];

const phraseConfig = {
    '唔該': { color: '#FF6B6B', icon: '🙏', toneCode: 'm4goi1' },
    '多謝': { color: '#4DABF7', icon: '❤️', toneCode: 'do1ze6' },
    '我要': { color: '#51CF66', icon: '🙋', toneCode: 'ngo5jiu3' },
    '幫我': { color: '#FCC419', icon: '🤝', toneCode: 'bong1ngo5' },
    '比你': { color: '#B197FC', icon: '🤲', toneCode: 'bei2nei5' }
};

let gameActiveList = [];
let currentItem = null;
let score = 0;
let audioCtx = null;

function initAudio() {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    if (audioCtx.state === 'suspended') audioCtx.resume();
}

function playTone(type) {
    if (!audioCtx) return;
    const now = audioCtx.currentTime;
    
    const runSyllable = (fStart, fEnd, startOffset, length, isRising) => {
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.connect(gain); gain.connect(audioCtx.destination);
        osc.type = 'triangle';
        
        osc.frequency.setValueAtTime(fStart, now + startOffset);
        if(isRising) {
            osc.frequency.exponentialRampToValueAtTime(fEnd, now + startOffset + length);
        } else {
            osc.frequency.linearRampToValueAtTime(fEnd, now + startOffset + length);
        }
        
        gain.gain.setValueAtTime(0.15, now + startOffset);
        gain.gain.exponentialRampToValueAtTime(0.01, now + startOffset + length);
        osc.start(now + startOffset);
        osc.stop(now + startOffset + length + 0.02);
    };

    if (type === 'success') {
        runSyllable(523, 523, 0, 0.1, false); runSyllable(659, 659, 0.1, 0.1, false); runSyllable(784, 784, 0.2, 0.1, false);
        return;
    }
    if (type === 'fail') {
        runSyllable(150, 100, 0, 0.25, false);
        return;
    }

    // Process structured Cantonese frequency curves natively
    if (type === 'm4goi1') {
        runSyllable(220, 200, 0, 0.22, false); runSyllable(392, 392, 0.25, 0.25, false);
    } else if (type === 'do1ze6') {
        runSyllable(392, 392, 0, 0.22, false); runSyllable(220, 220, 0.25, 0.25, false);
    } else if (type === 'ngo5jiu3') {
        runSyllable(220, 293, 0, 0.22, true);  runSyllable(330, 330, 0.25, 0.25, false);
    } else if (type === 'bong1ngo5') {
        runSyllable(392, 392, 0, 0.22, false); runSyllable(220, 293, 0.25, 0.25, true);
    } else if (type === 'bei2nei5') {
        runSyllable(220, 293, 0, 0.22, true);  runSyllable(220, 293, 0.25, 0.25, true);
    }
}

function startGame() {
    initAudio();
    // Fix mobile Safari restriction by firing a silent instant burst to warm the channel
    if(audioCtx) {
        const o = audioCtx.createOscillator(); const g = audioCtx.createGain();
        o.connect(g); g.connect(audioCtx.destination); g.gain.setValueAtTime(0.001, audioCtx.currentTime);
        o.start(); o.stop(audioCtx.currentTime + 0.05);
    }
    score = 0;
    gameActiveList = [...poolScenarios].sort(() => Math.random() - 0.5).slice(0, 5);
    document.getElementById('startScreen').classList.remove('active');
    document.getElementById('playScreen').classList.add('active');
    nextRound();
}

function nextRound() {
    if (gameActiveList.length === 0) {
        document.getElementById('playScreen').classList.remove('active');
        document.getElementById('winScreen').classList.add('active');
        return;
    }

    document.getElementById('scoreDisplay').innerText = `🌟 得分: ${score} / 5`;
    currentItem = gameActiveList.pop();
    
    document.getElementById('scenEmoji').innerText = currentItem.emoji;
    document.getElementById('scenText').innerText = currentItem.text;

    const correctPhrase = currentItem.phrase;
    const distinctPhrases = Object.keys(phraseConfig).filter(p => p !== correctPhrase);
    const shuffledDistractors = distinctPhrases.sort(() => Math.random() - 0.5).slice(0, 2);
    const operationalChoices = [correctPhrase, ...shuffledDistractors].sort(() => Math.random() - 0.5);
    
    const container = document.getElementById('choicesGrid');
    container.innerHTML = '';
    
    operationalChoices.forEach(phraseString => {
        const conf = phraseConfig[phraseString];
        const card = document.createElement('div');
        card.className = 'choice-card';
        card.style.backgroundColor = conf.color;
        card.style.border = `3px solid ${conf.color}`;
        
        // Internal structured zones dividing hit regions cleanly
        card.innerHTML = `
            <div class="choice-main-content" id="clickArea_${phraseString}">
                <div class="choice-icon">${conf.icon}</div>
                <div class="choice-text">${phraseString}</div>
            </div>
            <div class="speaker-bubble" id="speaker_${phraseString}">🔊</div>
        `;
        
        // Click Routing Engine separating standard submissions from exploratory sounds queries
        card.addEventListener('click', function(e) {
            e.stopPropagation();
            // Check if user specifically tapped the speaker element boundaries
            if(e.target.id === `speaker_${phraseString}` || e.target.classList.contains('speaker-bubble')) {
                playTone(conf.toneCode);
            } else {
                handleChoiceSelection(phraseString);
            }
        });

        container.appendChild(card);
    });

    setTimeout(() => { playTone(currentItem.toneCode); }, 400);
}

function handleChoiceSelection(selectedPhrase) {
    const isCorrect = (selectedPhrase === currentItem.phrase);
    const overlay = document.getElementById('feedbackOverlay');
    const fEmoji = document.getElementById('feedbackEmoji');
    const fMsg = document.getElementById('feedbackMsg');

    if (isCorrect) {
        score++;
        fEmoji.innerText = "👍";
        fMsg.innerText = "答對了！啱晒喇！";
        fMsg.style.color = "#2B8A3E";
        playTone('success');
    } else {
        fEmoji.innerText = "❤️";
        fMsg.innerText = "再聽多次？";
        fMsg.style.color = "#C92A2A";
        playTone('fail');
    }

    overlay.style.display = 'flex';
    
    setTimeout(() => {
        overlay.style.display = 'none';
        if (isCorrect) nextRound();
        else playTone(currentItem.toneCode);
    }, 2000);
}

function resetToMenu() {
    document.getElementById('winScreen').classList.remove('active');
    document.getElementById('startScreen').classList.add('active');
}
</script>

</body>
</html>
