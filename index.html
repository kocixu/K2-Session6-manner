<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>禮貌小先鋒 - Manner Squad</title>
    <style>
        body {
            margin: 0; padding: 0;
            background-color: #f0f8ff;
            font-family: 'Helvetica Neue', 'PingFang HK', 'Microsoft JhengHei', Arial, sans-serif;
            display: flex; justify-content: center; align-items: center;
            min-height: 100vh; overflow: hidden; touch-action: manipulation;
        }
        #gameApp {
            width: 100%; max-width: 960px; aspect-ratio: 16 / 9;
            background: #ffffff; border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
            position: relative; display: flex; flex-direction: column;
            align-items: center; justify-content: space-between;
            box-sizing: border-box; padding: 3vh 4vw;
        }
        @media (max-aspect-ratio: 16/9) {
            #gameApp { width: 95vw; height: calc(95vw * 9 / 16); }
        }
        .screen { display: none; width: 100%; height: 100%; flex-direction: column; align-items: center; justify-content: center; }
        .screen.active { display: flex; }
        h1 { color: #2B8A3E; font-size: 4.5vh; margin: 0 0 1vh 0; }
        p { color: #495057; font-size: 2.5vh; margin: 0 0 3vh 0; text-align: center; }
        .score-bar { align-self: flex-start; font-size: 2.6vh; font-weight: bold; color: #495057; margin-bottom: 0.5vh; }
        .scenario-container {
            background: #f8f9fa; border: 3px solid #dee2e6; border-radius: 16px;
            width: 90%; padding: 2vh 2vw; text-align: center;
            display: flex; flex-direction: column; align-items: center;
        }
        .scenario-emoji { font-size: 6vh; margin-bottom: 0.5vh; line-height: 1; }
        .scenario-text { font-size: 2.8vh; font-weight: bold; color: #212529; line-height: 1.3; }
        .audio-control-deck { margin-top: 1.5vh; }
        .audio-btn-whole {
            background: #E6FFFA; border: 2px solid #0EA5E9; border-radius: 12px;
            padding: 1vh 2.5vw; color: #0EA5E9; font-weight: bold; font-size: 2vh;
            cursor: pointer; display: flex; align-items: center; gap: 0.5vw;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }
        .choices-grid { display: flex; justify-content: center; gap: 3vw; width: 100%; margin-top: 1vh; }
        .choice-wrapper { flex: 1; max-width: 240px; display: flex; flex-direction: column; align-items: center; gap: 1vh; }
        .choice-card {
            border-radius: 16px; width: 100%; height: 16vh;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            cursor: pointer; box-shadow: 0 6px 15px rgba(0,0,0,0.06); box-sizing: border-box;
        }
        .choice-icon { font-size: 4vh; margin-bottom: 0.2vh; }
        .choice-text { font-size: 3.5vh; font-weight: bold; color: #ffffff; text-shadow: 0 2px 4px rgba(0,0,0,0.15); }
        .speaker-bubble-outside {
            background: #f1f3f5; border: 2px solid #ced4da; border-radius: 50%;
            width: 5vh; height: 5vh; display: flex; align-items: center; justify-content: center;
            font-size: 2.5vh; color: #495057; cursor: pointer; box-shadow: 0 3px 6px rgba(0,0,0,0.08);
        }
        .btn-prime {
            background: #10B981; color: white; border: none; padding: 2vh 5vw;
            font-size: 3vh; font-weight: bold; border-radius: 50px; cursor: pointer;
        }
        .feedback-overlay {
            display: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255,255,255,0.94); border-radius: 20px;
            flex-direction: column; align-items: center; justify-content: center; z-index: 10;
        }
        .feedback-text { font-size: 4.5vh; font-weight: bold; margin-top: 2vh; }
    </style>
</head>
<body>

<div id="gameApp">
    <div id="startScreen" class="screen active">
        <h1>禮貌小先鋒! 🚀</h1>
        <p>睇下發生咩事，幫小朋友揀個有禮貌嘅回應啦！</p>
        <button class="btn-prime" onclick="startGame()">開始遊戲</button>
    </div>

    <div id="playScreen" class="screen">
        <div class="score-bar" id="scoreDisplay">🌟 得分: 0 / 5</div>
        <div class="scenario-container">
            <div class="scenario-emoji" id="scenEmoji">🏫</div>
            <div class="scenario-text" id="scenText">載入中...</div>
            <div class="audio-control-deck">
                <button class="audio-btn-whole" onclick="playAudioFile(currentItem.audioFile)">📢 聽完整句子</button>
            </div>
        </div>
        <div class="choices-grid" id="choicesGrid"></div>
    </div>

    <div id="winScreen" class="screen">
        <h1 style="color: #0CA678;">你好比心機呀！你完成挑戰喇！ 🎉</h1>
        <div style="font-size: 10vh; margin: 1vh 0;">⭐⭐⭐⭐⭐</div>
        <button class="btn-prime" onclick="resetToMenu()">再玩一次</button>
    </div>

    <div id="feedbackOverlay" class="feedback-overlay">
        <div id="feedbackEmoji" style="font-size: 12vh;">👍</div>
        <div id="feedbackMsg" class="feedback-text">啱喇！</div>
    </div>
</div>

<script>
// Automatically targets files within your assets directory safely
const AUDIO_FOLDER = 'assets/';

const poolScenarios = [
    { phrase: '唔該', emoji: '✏️', text: '同學遞支鉛筆比你，你要同佢講...', audioFile: 'scen_m4goi1_1.mp3' },
    { phrase: '唔該', emoji: '📚', text: '老師遞本書俾你，你要講...', audioFile: 'scen_m4goi1_2.mp3' },
    { phrase: '多謝', emoji: '🎁', text: '朋友送咗一張好靚嘅貼紙比你，你要講...', audioFile: 'scen_do1ze6_1.mp3' },
    { phrase: '多謝', emoji: '🍬', text: '校長送一粒糖獎勵你，你要同校長講...', audioFile: 'scen_do1ze6_2.mp3' },
    { phrase: '我要', emoji: '🍎', text: '食茶點嘅時候你想要大蘋果，你要同老師講...', audioFile: 'scen_ngo5jiu3_1.mp3' },
    { phrase: '我要', emoji: '🎨', text: '美勞堂你想要藍色嘅畫筆，你要指住講...', audioFile: 'scen_ngo5jiu3_2.mp3' },
    { phrase: '幫我', emoji: '🧥', text: '你拉唔到外套嘅拉鏈，你要向老師講...', audioFile: 'scen_bong1ngo5_1.mp3' },
    { phrase: '幫我', emoji: '🫙', text: '水樽蓋扭得太緊，所以你開唔到，你要搵大人講...', audioFile: 'scen_bong1ngo5_2.mp3' },
    { phrase: '比你', emoji: '🚗', text: '你想將自己架玩具車分享比小隊友玩，你要講...', audioFile: 'scen_bei2nei5_1.mp3' },
    { phrase: '比你', emoji: '📄', text: '你做好功課，交比老師嘅時候要講......', audioFile: 'scen_bei2nei5_2.mp3' }
];

const phraseConfig = {
    '唔該': { color: '#FF6B6B', icon: '🙏', audioFile: 'phrase_m4goi1.mp3' },
    '多謝': { color: '#4DABF7', icon: '❤️', audioFile: 'phrase_do1ze6.mp3' },
    '我要': { color: '#51CF66', icon: '🙋', audioFile: 'phrase_ngo5jiu3.mp3' },
    '幫我': { color: '#FCC419', icon: '🤝', audioFile: 'phrase_bong1ngo5.mp3' },
    '比你': { color: '#B197FC', icon: '🤲', audioFile: 'phrase_bei2nei5.mp3' }
};

let gameActiveList = [];
let currentItem = null;
let score = 0;
let activeAudio = null;

function playAudioFile(fileName) {
    try {
        if (activeAudio) { 
            activeAudio.pause(); 
            activeAudio.currentTime = 0; 
        }
        activeAudio = new Audio(AUDIO_FOLDER + fileName);
        activeAudio.play().catch(e => console.log("Audio skipped or blocked safely:", fileName));
    } catch (err) {
        console.log("Audio structural capture bypass:", err);
    }
}

function startGame() {
    score = 0;
    gameActiveList = [...poolScenarios].sort(() => Math.random() - 0.5).slice(0, 5);
    document.getElementById('startScreen').classList.remove('active');
    document.getElementById('playScreen').classList.add('active');
    nextRound();
}

function nextRound() {
    if (gameActiveList.length === 0) {
        document.getElementById('playScreen').classList.remove('active');
        document.getElementById('winScreen').classList.add('active');
        return;
    }
    document.getElementById('scoreDisplay').innerText = `🌟 得分: ${score} / 5`;
    currentItem = gameActiveList.pop();
    document.getElementById('scenEmoji').innerText = currentItem.emoji;
    document.getElementById('scenText').innerText = currentItem.text;

    const correctPhrase = currentItem.phrase;
    const distinctPhrases = Object.keys(phraseConfig).filter(p => p !== correctPhrase);
    const shuffledDistractors = distinctPhrases.sort(() => Math.random() - 0.5).slice(0, 2);
    const operationalChoices = [correctPhrase, ...shuffledDistractors].sort(() => Math.random() - 0.5);
    
    const container = document.getElementById('choicesGrid');
    container.innerHTML = '';
    
    operationalChoices.forEach(phraseString => {
        const conf = phraseConfig[phraseString];
        const wrapper = document.createElement('div');
        wrapper.className = 'choice-wrapper';
        wrapper.innerHTML = `
            <div class="choice-card" style="background-color: ${conf.color}; border: 3px solid ${conf.color};" id="card_${phraseString}">
                <div class="choice-icon">${conf.icon}</div>
                <div class="choice-text">${phraseString}</div>
            </div>
            <div class="speaker-bubble-outside" id="speaker_${phraseString}">🔊</div>
        `;
        wrapper.addEventListener('click', function(e) {
            e.stopPropagation();
            if (e.target.id === `speaker_${phraseString}` || e.target.classList.contains('speaker-bubble-outside')) {
                playAudioFile(conf.audioFile);
            } else {
                handleChoiceSelection(phraseString);
            }
        });
        container.appendChild(wrapper);
    });
    
    playAudioFile(currentItem.audioFile);
}

function handleChoiceSelection(selectedPhrase) {
    const isCorrect = (selectedPhrase === currentItem.phrase);
    const overlay = document.getElementById('feedbackOverlay');
    const fEmoji = document.getElementById('feedbackEmoji');
    const fMsg = document.getElementById('feedbackMsg');

    if (isCorrect) {
        score++; fEmoji.innerText = "👍"; fMsg.innerText = "啱喇！";
        fMsg.style.color = "#2B8A3E"; playAudioFile('success.mp3');
    } else {
        fEmoji.innerText = "❤️"; fMsg.innerText = "再聽多一次？";
        fMsg.style.color = "#C92A2A"; playAudioFile('fail.mp3');
    }

    overlay.style.display = 'flex';
    setTimeout(() => {
        overlay.style.display = 'none';
        if (isCorrect) nextRound();
        else playAudioFile(currentItem.audioFile);
    }, 2000);
}

function resetToMenu() {
    document.getElementById('winScreen').classList.remove('active');
    document.getElementById('startScreen').classList.add('active');
}
</script>
</body>
</html>
